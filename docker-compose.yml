services:
  database:
    image: mariadb
    restart: always
    container_name: pterohosting-database
    environment:
      MYSQL_DATABASE: ${DATABASE_NAME:-panel}
      MYSQL_USER: ${DATABASE_USER:-pterodactyl}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD:-thisisthepasswordforpterodactyl}
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
    networks:
      - data-storage
    volumes:
      - db:/var/lib/mysql
  cache:
    image: redis
    restart: always
    container_name: pterohosting-cache
    networks:
      - data-storage
  php-fpm:
    build:
      context: ./pterodactyl-panel-app
    restart: always
    container_name: pterohosting-panel
    depends_on:
      - database
    volumes:
      - app:/var/www/html/
      - storage:/var/www/html/storage/
      - public:/var/www/html/public/
    environment:
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: ${DATABASE_NAME:-panel}
      DB_USERNAME: ${DATABASE_USER:-pterodactyl}
      DB_PASSWORD: ${DATABASE_PASSWORD:-thisisthepasswordforpterodactyl}
      REDIS_HOST: ${REDIS_HOST:-cache}
      REDIS_PORT: ${REDIS_PORT:-6379}
    networks:
      - file-serving
      - data-storage
  nginx:
    image: yoshiwalsh/nginx-for-php-fpm
    restart: always
    container_name: pterohosting-proxy
    env_file: ./.env.nginx
    networks:
      - proxy
      - file-serving
    depends_on:
      - php-fpm
    volumes:
      - public:/var/www/html/

networks:
  proxy:
    external: true
  file-serving:
  data-storage:

volumes:
  public:
  db:
  storage:
  app:
