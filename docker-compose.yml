services:
  database:
    image: mariadb
    restart: always
    container_name: pterohosting-database
    environment:
      MYSQL_DATABASE: ${DATABASE_NAME:-panel}
      MYSQL_USER: ${DATABASE_USER:-pterodactyl}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD:-thisisthepasswordforpterodactyl}
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
    volumes:
      - db:/var/lib/mysql
  cache:
    image: redis
    restart: always
    container_name: pterohosting-cache
  php-fpm:
    build:
      context: ./pterodactyl-panel-app
    restart: always
    container_name: pterohosting-panel
    depends_on:
      - database
    volumes:
      - app:/var/www/html/
      - storage:/var/www/html/storage/
      - public:/var/www/html/public/
    environment:
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: ${DATABASE_NAME:-panel}
      DB_USERNAME: ${DATABASE_USER:-pterodactyl}
      DB_PASSWORD: ${DATABASE_PASSWORD:-thisisthepasswordforpterodactyl}
  nginx:
    image: yoshiwalsh/nginx-for-php-fpm
    restart: always
    container_name: pterohosting-proxy
    env_file: ./.env.nginx
    environment:
      - VIRTUAL_HOST=${PTERO_DOMAIN:-hosting.yourdomain.com}
      - VIRTUAL_PORT=80
    networks:
      - proxy
    depends_on:
      - php-fpm
    volumes:
      - public:/var/www/html/

networks:
  proxy:
    external: true

volumes:
  public:
  db:
  storage:
  app:
